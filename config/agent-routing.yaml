version: 1
default_mode: READ_ONLY

orchestrator:
  default_agent: sap_orchestrator
  always_enforce:
    - no_sap_mutation
    - no_transaction_execution
    - no_abap_execution
    - mandatory_filters_for_business_reads
    - cite_local_index_or_sap_read_trace

routes:
  data_dictionary:
    agent: sap_knowledge_agent
    keywords:
      - table
      - field
      - ddic
      - domain
      - data element
      - foreign key
      - check table
      - struktur
      - tabel
      - kolom

  abap:
    agent: sap_technical_agent
    keywords:
      - abap
      - source
      - program
      - include
      - submit
      - function
      - class
      - tcode
      - z report

  pp_pro:
    agent: sap_functional_agent
    lens: PP
    keywords:
      - production order
      - process order
      - pro
      - aufnr
      - routing
      - bom
      - work center
      - component
      - status order

  classification:
    agent: sap_functional_agent
    lens: Classification
    keywords:
      - characteristic
      - karakteristik
      - batch
      - batch characteristic
      - ausp
      - class
      - klasifikasi
      - atinn
      - atnam

  qm:
    agent: sap_functional_agent
    lens: QM
    keywords:
      - inspection lot
      - quality
      - qm
      - prueflos
      - usage decision
      - qals
      - qave
      - qamr

  fi_co:
    agent: sap_functional_agent
    lens: FI/CO
    keywords:
      - fi
      - co
      - fico
      - accounting
      - controlling
      - cost center
      - profit center
      - bkpf
      - bseg
      - coep

  mm:
    agent: sap_functional_agent
    lens: MM
    keywords:
      - material
      - procurement
      - purchase order
      - purchase history
      - goods movement
      - inventory
      - mm
      - mara
      - ekko
      - ekpo
      - ekbe
      - mseg

  sd:
    agent: sap_functional_agent
    lens: SD
    keywords:
      - sales order
      - delivery
      - ship-to
      - sold-to
      - partner
      - billing
      - invoice
      - customer
      - sd
      - vbak
      - vbap
      - vbpa
      - likp
      - lips
      - vbrk
      - vbrp

multi_agent_patterns:
  production_quality_characteristic:
    when_any:
      - process order
      - production order
      - characteristic
      - inspection lot
    agents:
      - sap_functional_agent
      - sap_knowledge_agent

  production_costing:
    when_any:
      - process order cost
      - production cost
      - settlement
      - cost center
    agents:
      - sap_functional_agent

  z_report_explanation:
    when_any:
      - z report
      - z tcode
      - source logic
    agents:
      - sap_technical_agent
      - sap_knowledge_agent

  batch_sales_trace:
    min_matches: 2
    when_any:
      - batch
      - delivery
      - sales order
      - ship-to
      - sold-to
    agents:
      - sap_functional_agent
      - sap_knowledge_agent

  purchase_quality_trace:
    min_matches: 2
    when_any:
      - purchase order
      - inspection lot
      - quality
      - goods receipt
    agents:
      - sap_functional_agent
